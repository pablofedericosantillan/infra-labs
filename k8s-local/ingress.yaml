# Exposes the API locally through http://woki-brain.local.
# Requires: minikube addons enable ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: woki-brain
  namespace: k8s-local
spec:
  ingressClassName: nginx
  rules:
    - host: woki-brain.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: woki-brain
                port:
                  number: 80
