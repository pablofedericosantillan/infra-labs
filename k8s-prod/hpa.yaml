# Scales the API pods when CPU usage grows.
# Requires metrics-server or another metrics provider in the EKS cluster.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: woki-brain
  namespace: k8s-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: woki-brain
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
